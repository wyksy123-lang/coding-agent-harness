name: CI

"on":
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install httpx pyyaml keyring fastapi uvicorn websockets pytest pytest-json-report ruff mypy

      - name: Run tests
        run: python -m pytest tests/ -v

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install httpx pyyaml keyring fastapi uvicorn websockets pytest pytest-json-report ruff mypy

      - name: Run ruff
        run: python -m ruff check harness/ tests/

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install httpx pyyaml keyring fastapi uvicorn websockets pytest pytest-json-report ruff mypy

      - name: Run mypy
        run: python -m mypy harness/
