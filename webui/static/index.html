<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coding Agent Harness</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main id="app">
    <section class="status-panel" aria-labelledby="status-heading">
      <h1 id="status-heading">Coding Agent Harness</h1>
      <p id="connection-status">连接中</p>
      <dl class="status-grid">
        <div>
          <dt>运行模式</dt>
          <dd id="mode-value">—</dd>
        </div>
        <div>
          <dt>任务状态</dt>
          <dd id="run-status-value">—</dd>
        </div>
        <div>
          <dt>当前阶段</dt>
          <dd id="phase-value">—</dd>
        </div>
        <div>
          <dt>测试状态</dt>
          <dd id="test-status-value">未开始</dd>
        </div>
        <div>
          <dt>测试通过</dt>
          <dd id="passed-count-value">—</dd>
        </div>
        <div>
          <dt>测试失败</dt>
          <dd id="failed-count-value">—</dd>
        </div>
        <div id="failure-type-card" hidden>
          <dt>失败类型</dt>
          <dd id="failure-type-value">—</dd>
        </div>
        <div id="failure-details-card" hidden>
          <dt>失败详情</dt>
          <dd id="failure-details-value">—</dd>
        </div>
        <div>
          <dt>当前轮次</dt>
          <dd id="round-number-value">0</dd>
        </div>
        <div>
          <dt>当前策略</dt>
          <dd id="strategy-value">—</dd>
        </div>
        <div>
          <dt>停止原因</dt>
          <dd id="stop-reason-value">—</dd>
        </div>
      </dl>
    </section>

    <section class="timeline-panel" aria-labelledby="timeline-heading">
      <h2 id="timeline-heading">运行时间线</h2>
      <p id="current-event-value">—</p>
      <ol id="timeline-list" aria-live="polite"></ol>
    </section>

    <section class="hitl-panel" aria-labelledby="hitl-heading">
      <h2 id="hitl-heading">人工审批</h2>
      <div id="hitl-list" aria-live="polite"></div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
