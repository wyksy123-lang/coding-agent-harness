<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coding Agent Harness</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main id="app">
    <section class="status-panel" aria-labelledby="status-heading">
      <h1 id="status-heading">Coding Agent Harness</h1>
      <p id="connection-status">Connecting</p>
      <dl class="status-grid">
        <div>
          <dt>Mode</dt>
          <dd id="mode-value">Not available</dd>
        </div>
        <div>
          <dt>Status</dt>
          <dd id="run-status-value">Not available</dd>
        </div>
        <div>
          <dt>Phase</dt>
          <dd id="phase-value">Not available</dd>
        </div>
        <div>
          <dt>Tests</dt>
          <dd id="test-status-value">Not available</dd>
        </div>
        <div>
          <dt>Passed</dt>
          <dd id="passed-count-value">0</dd>
        </div>
        <div>
          <dt>Failed</dt>
          <dd id="failed-count-value">0</dd>
        </div>
        <div>
          <dt>Failure</dt>
          <dd id="failure-type-value">Not available</dd>
        </div>
        <div>
          <dt>Details</dt>
          <dd id="failure-details-value">Not available</dd>
        </div>
        <div>
          <dt>Round</dt>
          <dd id="round-number-value">0</dd>
        </div>
        <div>
          <dt>Strategy</dt>
          <dd id="strategy-value">Not available</dd>
        </div>
        <div>
          <dt>Stop</dt>
          <dd id="stop-reason-value">Not available</dd>
        </div>
      </dl>
    </section>

    <section class="timeline-panel" aria-labelledby="timeline-heading">
      <h2 id="timeline-heading">Run timeline</h2>
      <p id="current-event-value">Not available</p>
      <ol id="timeline-list" aria-live="polite"></ol>
    </section>

    <section class="hitl-panel" aria-labelledby="hitl-heading">
      <h2 id="hitl-heading">HITL approvals</h2>
      <div id="hitl-list" aria-live="polite"></div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
